<!DOCTYPE html>
<html lang="ru">
  <head>

    <title>Все вопросы | ИНТ Квиз</title>
    <link rel="stylesheet" href="../CSS/styles.css">
    <script src="../JS/quiz-data.js" defer></script>
    <script src="../JS/quiz.js" defer></script>

  <body class="quiz-page quiz-page--questions" data-page="all-questions">
